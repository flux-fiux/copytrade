# Commercial self-host stack (single server). DB + Auth stay on Supabase Cloud.
#
#   cp .env.compose.example .env          # domains + NEXT_PUBLIC_* (web build args)
#   # also fill apps/api/.env, apps/worker-ct/.env, apps/worker-rt/.env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates TLS and routes APP_DOMAIN→web, API_DOMAIN→api, WS_DOMAIN→worker-rt.
name: copytrade   # explicit — the repo dir name (跟单社区) is not a valid compose project name
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build: { context: ./apps/api, dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: ./apps/api/.env            # REDIS_URL=redis://redis:6379/0 ; DATABASE_URL=Supabase pooler
    depends_on: [redis]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:                                 # Celery workers + beat
    build: { context: ./apps/api, dockerfile: Dockerfile.worker }
    restart: unless-stopped
    env_file: ./apps/api/.env
    depends_on: [redis, api]

  worker-ct:                              # CopyFactory copy executor
    build: { context: ./apps/worker-ct, dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: ./apps/worker-ct/.env       # API_URL=http://api:8000
    depends_on: [api]

  worker-rt:                              # Socket.IO realtime
    build: { context: ./apps/worker-rt, dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: ./apps/worker-rt/.env       # INTERNAL_API_URL=http://api:8000
    depends_on: [api]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      WS_DOMAIN: ${WS_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, api, worker-rt]

volumes:
  redis-data:
  caddy-data:
  caddy-config:
